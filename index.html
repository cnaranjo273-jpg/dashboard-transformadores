<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEQ - Sistema Integral de Gestión de Activos Eléctricos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #eef2f5;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header Profesional */
        .header {
            background: linear-gradient(135deg, #0a2b44 0%, #0f3b5c 100%);
            border-radius: 20px;
            padding: 24px 32px;
            margin-bottom: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "";
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            pointer-events: none;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.3px;
        }

        .header h1::before {
            content: "⚡";
            font-size: 1.8rem;
            font-weight: normal;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.8;
            font-weight: 400;
        }

        /* Stats Cards Profesionales */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .stat-card h3 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e4a6b;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .stat-card p {
            color: #5a6874;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-trend {
            font-size: 0.7rem;
            margin-top: 8px;
            color: #2c7a4d;
        }

        /* Tabs */
        .tabs-container {
            background: white;
            border-radius: 20px;
            margin-bottom: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .tabs {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #e9edf2;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 16px 28px;
            background: transparent;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #5a6874;
            font-family: 'Inter', sans-serif;
        }

        .tab-btn:hover {
            background: #f1f5f9;
            color: #1e4a6b;
        }

        .tab-btn.active {
            background: white;
            color: #1e4a6b;
            border-bottom: 2px solid #1e4a6b;
        }

        .tab-content {
            display: none;
            padding: 28px;
            animation: fadeIn 0.25s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Filters */
        .filters {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 28px;
            border: 1px solid #e9edf2;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.2s;
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
            background: white;
        }

        .search-box input:focus {
            outline: none;
            border-color: #1e4a6b;
            box-shadow: 0 0 0 3px rgba(30,74,107,0.1);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 18px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            color: #2d3e50;
        }

        .filter-btn:hover {
            background: #eef2ff;
            border-color: #1e4a6b;
        }

        .filter-btn.active {
            background: #1e4a6b;
            color: white;
            border-color: #1e4a6b;
        }

        /* Grid de Subestaciones */
        .subestaciones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(540px, 1fr));
            gap: 24px;
        }

        .subestacion-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .subestacion-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .subestacion-header {
            background: linear-gradient(135deg, #1e4a6b 0%, #1e5a7e 100%);
            color: white;
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subestacion-header h3 {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .toggle-icon {
            transition: transform 0.2s;
            font-size: 1rem;
        }

        .toggle-icon.expanded {
            transform: rotate(180deg);
        }

        .equipos-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .equipos-list.expanded {
            max-height: 8000px;
            transition: max-height 0.4s ease-in;
        }

        .seccion-equipos {
            border-bottom: 1px solid #eef2f5;
        }

        .seccion-titulo {
            background: #fafcfd;
            padding: 12px 20px;
            font-weight: 600;
            color: #1e4a6b;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            border-left: 3px solid #1e4a6b;
        }

        .equipo-item {
            padding: 14px 20px;
            border-bottom: 1px solid #f0f4f8;
            cursor: pointer;
            transition: background 0.15s;
        }

        .equipo-item:hover {
            background: #fafcfd;
        }

        .equipo-nombre {
            font-weight: 600;
            color: #1f2e3a;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.85rem;
        }

        .equipo-detalles {
            font-size: 0.7rem;
            color: #6c7a8a;
            margin-top: 6px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .prioridad-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .prioridad-CRÍTICO { background: #fee2e2; color: #b91c1c; }
        .prioridad-GRAVE { background: #fff3e0; color: #c2410c; }
        .prioridad-INTERMEDIO { background: #fef9e3; color: #b45309; }
        .prioridad-AVISO { background: #e0f2fe; color: #0c4e6e; }
        .prioridad-NORMAL { background: #e3f7e8; color: #166534; }
        .prioridad-Operativo { background: #e3f7e8; color: #166534; }
        .prioridad-Daño-Interno, .prioridad-incendiado, .prioridad-Averiado { background: #fee2e2; color: #b91c1c; }
        .prioridad-No-Operativo { background: #fff3e0; color: #c2410c; }
        .prioridad-Reserva { background: #e0f2fe; color: #0c4e6e; }

        .nivel-badge {
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
            background: #f1f5f9;
            color: #475569;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 560px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eef2f5;
        }

        .modal-header h2 {
            color: #1e4a6b;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-modal {
            cursor: pointer;
            font-size: 1.5rem;
            color: #94a3b8;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: #475569;
        }

        .detail-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .detail-label {
            font-weight: 500;
            width: 150px;
            color: #475569;
            font-size: 0.85rem;
        }

        .detail-value {
            flex: 1;
            color: #1e293b;
            font-size: 0.85rem;
        }

        .edit-form {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #eef2f5;
        }

        .edit-form label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #334155;
            font-size: 0.8rem;
        }

        .edit-form input, .edit-form select, .edit-form textarea {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .edit-form input:focus, .edit-form select:focus, .edit-form textarea:focus {
            outline: none;
            border-color: #1e4a6b;
            box-shadow: 0 0 0 3px rgba(30,74,107,0.1);
        }

        .save-btn {
            background: #1e4a6b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s;
        }

        .save-btn:hover {
            background: #0f3a55;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: #64748b;
            background: #f8fafc;
            border-radius: 20px;
        }

        /* Reportes mejorados */
        .reportes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 28px;
        }

        .reporte-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .reporte-card h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .reporte-valor {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e4a6b;
            margin-bottom: 8px;
        }

        .progress-bar-container {
            background: #e2e8f0;
            border-radius: 20px;
            height: 8px;
            margin: 16px 0;
            overflow: hidden;
        }

        .progress-bar {
            background: #1e4a6b;
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.85rem;
        }

        .stat-label {
            color: #475569;
        }

        .stat-number {
            font-weight: 600;
            color: #1e293b;
        }

        .badge-level {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .level-critico { background: #fee2e2; color: #b91c1c; }
        .level-grave { background: #fff3e0; color: #c2410c; }
        .level-intermedio { background: #fef9e3; color: #b45309; }
        .level-aviso { background: #e0f2fe; color: #0c4e6e; }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .subestaciones-grid { grid-template-columns: 1fr; }
            .detail-label { width: 110px; }
            .tab-btn { padding: 12px 16px; font-size: 0.75rem; }
            .stats-container { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Empresa Eléctrica Quito</h1>
            <p>Sistema Integral de Gestión de Activos Eléctricos | Transformadores e Inspecciones Termográficas</p>
        </div>

        <div class="stats-container" id="statsContainer">
            <div class="stat-card"><h3 id="totalSubestaciones">0</h3><p>Subestaciones</p></div>
            <div class="stat-card"><h3 id="totalTransformadores">0</h3><p>Transformadores</p></div>
            <div class="stat-card"><h3 id="totalEquiposTermicos">0</h3><p>Inspecciones Termográficas</p></div>
            <div class="stat-card"><h3 id="totalAlertas">0</h3><p>Alertas Críticas/Graves</p></div>
        </div>

        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="dashboard">📊 Dashboard de Activos</button>
                <button class="tab-btn" data-tab="alertas">⚠️ Alertas de Mantenimiento</button>
                <button class="tab-btn" data-tab="reportes">📈 Reporte General y Análisis</button>
            </div>

            <div id="tab-dashboard" class="tab-content active">
                <div class="filters">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="🔍 Buscar por subestación, equipo, nomenclatura o voltaje...">
                    </div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">📊 Todos los equipos</button>
                        <button class="filter-btn" data-filter="CRÍTICO">🔥 Crítico (Nivel 4)</button>
                        <button class="filter-btn" data-filter="GRAVE">⚠️ Grave (Nivel 3)</button>
                        <button class="filter-btn" data-filter="INTERMEDIO">🟡 Intermedio (Nivel 2)</button>
                        <button class="filter-btn" data-filter="AVISO">🔵 Aviso (Nivel 1)</button>
                        <button class="filter-btn" data-filter="Operativo">✅ Transformadores Operativos</button>
                        <button class="filter-btn" data-filter="No Operativo">❌ Transformadores No Operativos</button>
                    </div>
                </div>
                <div id="subestacionesGrid" class="subestaciones-grid"></div>
            </div>

            <div id="tab-alertas" class="tab-content">
                <div id="alertasList"></div>
            </div>

            <div id="tab-reportes" class="tab-content">
                <div id="reportesContainer"></div>
            </div>
        </div>
    </div>

    <!-- Modal para edición de Transformadores -->
    <div id="modalTransformador" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTransformadorTitle">Editar Mantenimiento de Transformador</h2>
                <span class="close-modal" onclick="cerrarModal('modalTransformador')">&times;</span>
            </div>
            <div id="modalTransformadorBody"></div>
            <div class="edit-form">
                <label>📅 Fecha Última Inspección:</label>
                <input type="date" id="editFechaInspeccionTransformador">
                <label>🔧 Próxima Mantención Programada:</label>
                <input type="date" id="editProximaMantencionTransformador">
                <label>📝 Observaciones:</label>
                <textarea id="editObservacionesTransformador" rows="3"></textarea>
                <button class="save-btn" onclick="guardarEdicionTransformador()">💾 Guardar Cambios</button>
            </div>
        </div>
    </div>

    <!-- Modal para edición de Inspecciones Termográficas -->
    <div id="modalTermico" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTermicoTitle">Editar Inspección Termográfica</h2>
                <span class="close-modal" onclick="cerrarModal('modalTermico')">&times;</span>
            </div>
            <div id="modalTermicoBody"></div>
            <div class="edit-form">
                <label>📅 Fecha de Inspección:</label>
                <input type="date" id="editFechaInspeccionTermico">
                <label>🌡️ Nivel de Mantenimiento:</label>
                <select id="editNivelMantenimientoTermico">
                    <option value="AVISO">AVISO (Nivel 1: 5-15°C)</option>
                    <option value="INTERMEDIO">INTERMEDIO (Nivel 2: 16-35°C)</option>
                    <option value="GRAVE">GRAVE (Nivel 3: 36-75°C)</option>
                    <option value="CRÍTICO">CRÍTICO (Nivel 4: Mayor a 75°C)</option>
                </select>
                <button class="save-btn" onclick="guardarEdicionTermico()">💾 Guardar Cambios</button>
            </div>
        </div>
    </div>

        function normalizarSubestacion(nombre) {
            if (!nombre) return "SIN SUBESTACIÓN";
            let normalized = nombre.toUpperCase().trim();
            normalized = normalized.replace(/Á/g, 'A').replace(/É/g, 'E').replace(/Í/g, 'I').replace(/Ó/g, 'O').replace(/Ú/g, 'U').replace(/Ü/g, 'U');
            normalized = normalized.replace(/Ñ/g, 'N');
            return normalized;
        }

        function agruparPorSubestacion(data) {
            const grupos = {};
            data.forEach(item => {
                let sub = item.subestacion || "SIN SUBESTACIÓN";
                sub = normalizarSubestacion(sub);
                if (!grupos[sub]) grupos[sub] = [];
                grupos[sub].push(item);
            });
            return grupos;
        }

        function filtrarEquipos(equipos) {
            return equipos.filter(e => {
                if (currentFilter !== "all") {
                    if (e.tipo === "transformador") {
                        if (currentFilter === "Operativo" && e.estado_actual !== "Operativo") return false;
                        if (currentFilter === "No Operativo" && e.estado_actual === "Operativo") return false;
                        if (!["Operativo", "No Operativo"].includes(currentFilter) && e.estado_actual !== currentFilter) return false;
                    } else {
                        if (e.prioridad !== currentFilter) return false;
                    }
                }
                if (currentSearch) {
                    const searchLower = currentSearch.toLowerCase();
                    const subNormalizada = normalizarSubestacion(e.subestacion).toLowerCase();
                    return subNormalizada.includes(searchLower) ||
                           ((e.nombre_equipo || e.equipo) || "").toLowerCase().includes(searchLower) ||
                           (e.nomenclatura || "").toLowerCase().includes(searchLower) ||
                           (e.voltaje || e.voltaje_primario_kv || "").toString().toLowerCase().includes(searchLower);
                }
                return true;
            });
        }

        function actualizarEstadisticas(equipos) {

            const transformadores = equipos.filter(e => e.tipo === "transformador").length;
            const termicos = equipos.filter(e => e.tipo === "termico").length;
            const alertas = equipos.filter(e => {
                if (e.tipo === "transformador") {
                    return e.estado_actual === "Daño Interno" || e.estado_actual === "Averiado" || e.estado_actual === "incendiado" || e.estado_actual === "No Operativo";
                }
                return e.prioridad === "CRÍTICO" || e.prioridad === "GRAVE";
            }).length;
            document.getElementById("totalSubestaciones").textContent = subestaciones.size;
            document.getElementById("totalTransformadores").textContent = transformadores;
            document.getElementById("totalEquiposTermicos").textContent = termicos;
            document.getElementById("totalAlertas").textContent = alertas;
        }

            const equiposFiltrados = filtrarEquipos(todosLosEquipos);
            const grupos = agruparPorSubestacion(equiposFiltrados);
            const subestacionesOrdenadas = Object.keys(grupos).sort();
            actualizarEstadisticas(equiposFiltrados);
            const grid = document.getElementById("subestacionesGrid");
            if (!grid) return;
            if (subestacionesOrdenadas.length === 0) {
                grid.innerHTML = '<div class="empty-state">🔍 No se encontraron resultados</div>';
                return;
            }
            grid.innerHTML = subestacionesOrdenadas.map(subestacion => {
                const equipos = grupos[subestacion];
                const transformadores = equipos.filter(e => e.tipo === "transformador");
                const termicos = equipos.filter(e => e.tipo === "termico");
                const criticosCount = equipos.filter(e => {
                    if (e.tipo === "transformador") return e.estado_actual !== "Operativo";
                    return e.prioridad === "CRÍTICO" || e.prioridad === "GRAVE";
                }).length;
                const safeId = subestacion.replace(/[^a-zA-Z0-9]/g, '_');
                return `
                    <div class="subestacion-card">
                        <div class="subestacion-header" onclick="toggleSubestacion('${subestacion.replace(/'/g, "\\'")}')">
                            <h3>📍 ${subestacion}<span class="badge">${equipos.length} equipos</span>${criticosCount > 0 ? `<span class="badge" style="background:#dc3545;">⚠️ ${criticosCount}</span>` : ''}</h3>
                            <span class="toggle-icon" id="icon-${safeId}">▼</span>
                        </div>
                        <div class="equipos-list" id="list-${safeId}">
                            ${transformadores.length > 0 ? `
                                <div class="seccion-equipos">
                                    <div class="seccion-titulo">🔌 TRANSFORMADORES (${transformadores.length})</div>
                                    ${transformadores.map(t => {
                                        const prioridad = getPrioridadTransformador(t.estado_actual);
                                        return `
                                            <div class="equipo-item" onclick="abrirModalTransformador('${t.id}')">
                                                <div class="equipo-info">
                                                    <div class="equipo-nombre">⚡ ${t.nombre_equipo}<span class="prioridad-badge ${getPrioridadClass(prioridad)}">${t.estado_actual}</span></div>
                                                    <div class="equipo-detalles">🏭 ${t.fabricante || "N/E"} | ⚡ ${t.voltaje_primario_kv}/${Array.isArray(t.voltaje_secundario_kv) ? t.voltaje_secundario_kv.join('/') : t.voltaje_secundario_kv} kV | 📊 ${t.capacidad || "N/E"} MVA</div>
                                                    <div class="equipo-detalles">📅 Última inspección: ${t.fecha_ultima_inspeccion || "N/R"} | 🔧 Próxima: ${t.proxima_mantencion_programada || "N/P"}</div>
                                                    <div class="equipo-detalles">📝 ${t.observaciones}</div>
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            ` : ''}
                            ${termicos.length > 0 ? `
                                <div class="seccion-equipos">
                                    <div class="seccion-titulo">🌡️ INSPECCIONES TERMOGRÁFICAS (${termicos.length})</div>
                                    ${termicos.map(e => `
                                        <div class="equipo-item" onclick="abrirModalTermico('${e.id}')">
                                            <div class="equipo-info">
                                                <div class="equipo-nombre">🔥 ${e.equipo}<span class="prioridad-badge ${getPrioridadClass(e.prioridad)}">${e.prioridad}</span><span class="nivel-badge">Nivel: ${e.nivel === "CRÍTICO" ? "4" : e.nivel === "GRAVE" ? "3" : e.nivel === "INTERMEDIO" ? "2" : "1"}</span></div>
                                                <div class="equipo-detalles">📛 ${e.nomenclatura} | ⚡ ${e.voltaje} | 📅 ${e.fecha_inspeccion}</div>
                                                <div class="equipo-detalles">📝 ${e.observacion}</div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            renderAlertas();
            renderReportes();
        }

        function renderAlertas() {
            const alertas = todosLosEquipos.filter(e => {
                if (e.tipo === "transformador") {
                    return e.estado_actual === "Daño Interno" || e.estado_actual === "Averiado" || e.estado_actual === "incendiado" || e.estado_actual === "No Operativo";
                }
                return e.prioridad === "CRÍTICO" || e.prioridad === "GRAVE";
            });
            const container = document.getElementById("alertasList");
            if (!container) return;
            if (alertas.length === 0) {
                container.innerHTML = '<div class="empty-state">✅ No hay alertas críticas o graves</div>';
                return;
            }
            container.innerHTML = `
                <div style="background:#f8fafc; border-radius:20px; padding:24px;">
                    <h3 style="color:#1e4a6b; margin-bottom:20px; font-size:1.1rem;">🚨 Equipos con Prioridad Crítica o Grave</h3>
                    ${alertas.map(e => {
                        const esTransformador = e.tipo === "transformador";
                        const titulo = esTransformador ? e.nombre_equipo : e.equipo;
                        const prioridad = esTransformador ? getPrioridadTransformador(e.estado_actual) : e.prioridad;
                        const detalles = esTransformador ? `🏭 ${e.fabricante || "N/E"} | ⚡ ${e.voltaje_primario_kv}/${Array.isArray(e.voltaje_secundario_kv) ? e.voltaje_secundario_kv.join('/') : e.voltaje_secundario_kv} kV` : `📛 ${e.nomenclatura} | ⚡ ${e.voltaje}`;
                        const fecha = esTransformador ? e.fecha_ultima_inspeccion : e.fecha_inspeccion;
                        const observacion = esTransformador ? e.observaciones : e.observacion;
                        return `
                            <div style="background:${prioridad === "CRÍTICO" ? '#fff5f5' : '#fff9f0'}; border-left:4px solid ${prioridad === "CRÍTICO" ? '#b91c1c' : '#c2410c'}; padding:16px; margin-bottom:16px; border-radius:16px;">
                                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:8px;">
                                    <strong style="font-size:0.95rem;">📍 ${normalizarSubestacion(e.subestacion)} - ${titulo}</strong>
                                    <span class="prioridad-badge ${getPrioridadClass(prioridad)}">${prioridad}</span>
                                </div>
                                <div style="font-size:0.8rem; color:#475569;">${detalles}</div>
                                <div style="font-size:0.8rem; color:#475569; margin:6px 0;">📅 Fecha inspección: ${fecha || "N/R"}</div>
                                <div style="font-size:0.85rem; font-weight:500; color:${prioridad === "CRÍTICO" ? '#b91c1c' : '#c2410c'}; margin:8px 0;">⚠️ ${observacion}</div>
                                <button class="filter-btn" style="margin-top:8px; background:#1e4a6b; color:white; border:none;" onclick="${esTransformador ? `abrirModalTransformador('${e.id}')` : `abrirModalTermico('${e.id}')`}">✏️ Editar</button>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderReportes() {
            const container = document.getElementById("reportesContainer");
            if (!container) return;
            
            const totalTransformadores = transformadoresData.length;
            const operativos = transformadoresData.filter(t => t.estado_actual === "Operativo").length;
            const noOperativos = totalTransformadores - operativos;
            const porcentajeOperativos = Math.round((operativos / totalTransformadores) * 100);
            const porcentajeMantenimientoRealizado = Math.round((transformadoresData.filter(t => t.proxima_mantencion_programada > new Date().toISOString().slice(0,10)).length / totalTransformadores) * 100);
            
            const criticosTermicos = inspeccionesData.filter(e => e.prioridad === "CRÍTICO").length;
            const gravesTermicos = inspeccionesData.filter(e => e.prioridad === "GRAVE").length;
            const intermediosTermicos = inspeccionesData.filter(e => e.prioridad === "INTERMEDIO").length;
            const avisosTermicos = inspeccionesData.filter(e => e.prioridad === "AVISO").length;
            const totalTermicos = inspeccionesData.length;
            
            const subestacionesCount = {};
            todosLosEquipos.forEach(e => { let sub = normalizarSubestacion(e.subestacion); subestacionesCount[sub] = (subestacionesCount[sub] || 0) + 1; });
            const topSubestaciones = Object.entries(subestacionesCount).sort((a, b) => b[1] - a[1]).slice(0, 5);
            
            container.innerHTML = `
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:24px; margin-bottom:28px;">
                    <div class="reporte-card">
                        <h3>📊 Estado Operativo de Transformadores</h3>
                        <div class="reporte-valor">${porcentajeOperativos}%</div>
                        <div class="progress-bar-container"><div class="progress-bar" style="width: ${porcentajeOperativos}%;"></div></div>
                        <div class="stat-row"><span class="stat-label">✅ Operativos:</span><span class="stat-number">${operativos} equipos (${porcentajeOperativos}%)</span></div>
                        <div class="stat-row"><span class="stat-label">❌ No Operativos/Dañados:</span><span class="stat-number">${noOperativos} equipos (${100 - porcentajeOperativos}%)</span></div>
                    </div>
                    <div class="reporte-card">
                        <h3>🔧 Mantenimiento Preventivo</h3>
                        <div class="reporte-valor">${porcentajeMantenimientoRealizado}%</div>
                        <div class="progress-bar-container"><div class="progress-bar" style="width: ${porcentajeMantenimientoRealizado}%; background:#2c7a4d;"></div></div>
                        <div class="stat-row"><span class="stat-label">✅ Con mantenimiento programado:</span><span class="stat-number">${Math.round(totalTransformadores * porcentajeMantenimientoRealizado / 100)} equipos</span></div>
                        <div class="stat-row"><span class="stat-label">⚠️ Mantenimiento vencido o próximo:</span><span class="stat-number">${transformadoresData.filter(t => t.proxima_mantencion_programada && t.proxima_mantencion_programada <= new Date().toISOString().slice(0,10)).length} equipos</span></div>
                    </div>
                    <div class="reporte-card">
                        <h3>🌡️ Niveles Termográficos</h3>
                        <div class="stat-row"><span class="stat-label"><span class="badge-level level-critico">CRÍTICO (N4)</span></span><span class="stat-number">${criticosTermicos} (${Math.round((criticosTermicos/totalTermicos)*100)}%)</span></div>
                        <div class="stat-row"><span class="stat-label"><span class="badge-level level-grave">GRAVE (N3)</span></span><span class="stat-number">${gravesTermicos} (${Math.round((gravesTermicos/totalTermicos)*100)}%)</span></div>
                        <div class="stat-row"><span class="stat-label"><span class="badge-level level-intermedio">INTERMEDIO (N2)</span></span><span class="stat-number">${intermediosTermicos} (${Math.round((intermediosTermicos/totalTermicos)*100)}%)</span></div>
                        <div class="stat-row"><span class="stat-label"><span class="badge-level level-aviso">AVISO (N1)</span></span><span class="stat-number">${avisosTermicos} (${Math.round((avisosTermicos/totalTermicos)*100)}%)</span></div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:24px;">
                    <div class="reporte-card">
                        <h3>🏆 Top 5 Subestaciones</h3>
                        ${topSubestaciones.map(([sub, count], idx) => `
                            <div class="stat-row"><span class="stat-label">${idx+1}. 📍 ${sub}</span><span class="stat-number">${count} equipos</span></div>
                        `).join('')}
                    </div>
                    <div class="reporte-card">
                        <h3>📈 Resumen General</h3>
                        <div class="stat-row"><span class="stat-label">Total Transformadores:</span><span class="stat-number">${totalTransformadores}</span></div>
                        <div class="stat-row"><span class="stat-label">Total Inspecciones Termográficas:</span><span class="stat-number">${totalTermicos}</span></div>
                        <div class="stat-row"><span class="stat-label">Total Activos Monitoreados:</span><span class="stat-number">${todosLosEquipos.length}</span></div>
                        <div class="stat-row"><span class="stat-label">Alertas Activas:</span><span class="stat-number" style="color:#b91c1c;">${todosLosEquipos.filter(e => { if(e.tipo==="transformador") return e.estado_actual!=="Operativo"; return e.prioridad==="CRÍTICO"||e.prioridad==="GRAVE"; }).length}</span></div>
                    </div>
                    <div class="reporte-card">
                        <h3>📋 Distribución por Prioridad</h3>
                        <div class="stat-row"><span class="stat-label">🔥 Crítico:</span><span class="stat-number">${criticosTermicos + transformadoresData.filter(t => t.estado_actual === "Daño Interno" || t.estado_actual === "Averiado").length}</span></div>
                        <div class="stat-row"><span class="stat-label">⚠️ Grave:</span><span class="stat-number">${gravesTermicos + transformadoresData.filter(t => t.estado_actual === "No Operativo").length}</span></div>
                        <div class="stat-row"><span class="stat-label">🟡 Intermedio/Aviso:</span><span class="stat-number">${intermediosTermicos + avisosTermicos + transformadoresData.filter(t => t.estado_actual === "Reserva").length}</span></div>
                        <div class="stat-row"><span class="stat-label">✅ Normal/Operativo:</span><span class="stat-number">${transformadoresData.filter(t => t.estado_actual === "Operativo").length + (totalTermicos - criticosTermicos - gravesTermicos)}</span></div>
                    </div>
                </div>
            `;
        }

        function toggleSubestacion(subestacion) {
            const safeId = subestacion.replace(/[^a-zA-Z0-9]/g, '_');
            const list = document.getElementById(`list-${safeId}`);
            const icon = document.getElementById(`icon-${safeId}`);
            if (list && list.classList.contains('expanded')) {
                list.classList.remove('expanded');
                if (icon) icon.classList.remove('expanded');
            } else if (list) {
                list.classList.add('expanded');
                if (icon) icon.classList.add('expanded');
            }
        }

        function initTabs() {
            const tabBtns = document.querySelectorAll(".tab-btn");
            tabBtns.forEach(btn => {
                btn.addEventListener("click", () => {
                    const tabId = btn.dataset.tab;
                    tabBtns.forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    document.querySelectorAll(".tab-content").forEach(content => content.classList.remove("active"));
                    document.getElementById(`tab-${tabId}`).classList.add("active");
                    if (tabId === "alertas") renderAlertas();
                    if (tabId === "reportes") renderReportes();
                });
            });
        }

        document.getElementById("searchInput")?.addEventListener("input", (e) => { currentSearch = e.target.value; renderDashboard(); });
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                renderDashboard();
            });
        });
        window.onclick = (event) => { if (event.target.classList.contains("modal")) event.target.style.display = "none"; };
        window.abrirModalTransformador = abrirModalTransformador;
        window.abrirModalTermico = abrirModalTermico;
        window.guardarEdicionTransformador = guardarEdicionTransformador;
        window.guardarEdicionTermico = guardarEdicionTermico;
        window.cerrarModal = cerrarModal;
        window.toggleSubestacion = toggleSubestacion;
        
        initTabs();
        renderDashboard();
    </script>
</body>
</html>
