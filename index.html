    <title>Dashboard de Transformadores - Gestión de Mantenimientos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #666;
            font-size: 0.9rem;
        }

        /* Alertas de Mantenimiento */
        .alertas-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .alertas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .alertas-header h2 {
            font-size: 1.3rem;
            color: #333;
        }

        .alertas-badge {
            background: #dc3545;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .alerta-item {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .alerta-item.urgente {
            background: #f8d7da;
            border-left-color: #dc3545;
        }

        .alerta-info {
            flex: 1;
        }

        .alerta-info strong {
            color: #856404;
        }

        .alerta-info .urgente-text {
            color: #721c24;
        }

        .alerta-fecha {
            font-size: 0.85rem;
            color: #856404;
        }

        .btn-alerta {
            background: #ffc107;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-alerta:hover {
            background: #e0a800;
        }

        /* Filters */
        .filters {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
            margin-bottom: 15px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-btn:hover {
            background: #e0e0e0;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        /* Subestaciones Grid */
        .subestaciones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
        }

        .subestacion-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .subestacion-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .subestacion-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subestacion-header h3 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .mantenimiento-warning {
            background: #ffc107;
            color: #856404;
        }

        .toggle-icon {
            transition: transform 0.3s;
            font-size: 1.2rem;
        }

        .toggle-icon.expanded {
            transform: rotate(180deg);
        }

        .transformadores-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }

        .transformadores-list.expanded {
            max-height: 3000px;
            transition: max-height 0.6s ease-in;
        }

        .transformador-item {
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .transformador-item:hover {
            background: #f8f9fa;
        }

        .transformador-info {
            flex: 1;
        }

        .transformador-nombre {
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .transformador-detalles {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
        }

        .estado-badge {
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .estado-Operativo { background: #d4edda; color: #155724; }
        .estado-Daño-Interno, .estado-incendiado, .estado-Averiado, .estado-Dado-de-baja { background: #f8d7da; color: #721c24; }
        .estado-No-Operativo { background: #fff3cd; color: #856404; }
        .estado-Reserva { background: #d1ecf1; color: #0c5460; }

        .mantenimiento-info {
            font-size: 0.7rem;
            margin-top: 4px;
            color: #856404;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mantenimiento-urgente {
            color: #dc3545;
            font-weight: bold;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            max-width: 650px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .close-modal {
            cursor: pointer;
            font-size: 1.5rem;
            color: #888;
        }

        .detail-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-label {
            font-weight: 600;
            width: 160px;
            color: #555;
        }

        .detail-value {
            flex: 1;
            color: #333;
        }

        .edit-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            font-size: 1rem;
        }

        .edit-btn:hover {
            background: #5a67d8;
        }

        .edit-form {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .edit-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .save-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .save-btn:hover {
            background: #218838;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: white;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .subestaciones-grid {
                grid-template-columns: 1fr;
            }
            .detail-label {
                width: 120px;
            }
        }
    </style>
</head>

        </div>

            <div class="stat-card"><h3 id="totalOperativos">0</h3><p>Operativos</p></div>
            <div class="stat-card"><h3 id="totalNoOperativos">0</h3><p>No Operativos</p></div>
        </div>

        <!-- Panel de Alertas de Mantenimiento -->
        <div class="alertas-container" id="alertasContainer">
            <div class="alertas-header">
                <h2>🔔 Alertas de Mantenimiento</h2>
                <span class="alertas-badge" id="alertasCount">0</span>
            </div>
            <div id="alertasList"></div>
        </div>

        <div class="filters">

                <input type="text" id="searchInput" placeholder="🔍 Buscar subestación, transformador, fabricante o número de serie...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">📊 Todos</button>
                <button class="filter-btn" data-filter="Operativo">✅ Operativos</button>
                <button class="filter-btn" data-filter="No Operativo">⚠️ No Operativos</button>
                <button class="filter-btn" data-filter="Daño Interno">🔥 Daño Interno</button>
                <button class="filter-btn" data-filter="Averiado">🔧 Averiados</button>
                <button class="filter-btn" data-filter="Reserva">📦 En Reserva</button>
                <button class="filter-btn" data-filter="mantenimiento">🔧 Mantenimiento Próximo</button>
            </div>
        </div>

        <div id="subestacionesGrid" class="subestaciones-grid">
            <div class="loading">📂 Cargando transformadores...</div>
        </div>
    </div>

    <!-- Modal para detalles y edición -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Detalles del Transformador</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div id="modalBody"></div>
            <button class="edit-btn" onclick="mostrarFormularioEdicion()">✏️ Editar Mantenimiento</button>
            <div id="editForm" class="edit-form">
                <h3>📅 Editar Fechas de Mantenimiento</h3>
                <label>Fecha Última Inspección:</label>
                <input type="date" id="editFechaInspeccion">
                <label>Próxima Mantención Programada:</label>
                <input type="date" id="editProximaMantencion">
                <button class="save-btn" onclick="guardarMantenimiento()">💾 Guardar Cambios</button>
            </div>
        </div>
    </div>

        // Variable para almacenar el transformador que se está editando
        let currentEditingId = null;

        // Estado actual
        let currentFilter = "all";
        let currentSearch = "";

        // Función para calcular días hasta próximo mantenimiento
        function calcularDiasHastaMantenimiento(fechaProxima) {
            if (!fechaProxima) return null;
            const hoy = new Date();
            const proxima = new Date(fechaProxima);
            const diffTime = proxima - hoy;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

        // Función para verificar si el mantenimiento está vencido o próximo
        function obtenerEstadoMantenimiento(fechaProxima) {
            const dias = calcularDiasHastaMantenimiento(fechaProxima);
            if (dias === null) return "sin-datos";
            if (dias < 0) return "vencido";
            if (dias <= 30) return "proximo";
            return "ok";
        }

        // Función para generar alertas de mantenimiento
        function generarAlertas(transformadores) {
            const hoy = new Date();
            const alertas = [];
            
            transformadores.forEach(t => {
                if (t.proxima_mantencion_programada) {
                    const dias = calcularDiasHastaMantenimiento(t.proxima_mantencion_programada);
                    if (dias < 0) {
                        alertas.push({
                            ...t,
                            tipo: "vencido",
                            mensaje: `Mantenimiento VENCIDO hace ${Math.abs(dias)} días`,
                            urgencia: "urgente"
                        });
                    } else if (dias <= 30) {
                        alertas.push({
                            ...t,
                            tipo: "proximo",
                            mensaje: `Mantenimiento programado en ${dias} días`,
                            urgencia: "advertencia"
                        });
                    }
                }
            });
            
            return alertas.sort((a, b) => {
                const diasA = calcularDiasHastaMantenimiento(a.proxima_mantencion_programada);
                const diasB = calcularDiasHastaMantenimiento(b.proxima_mantencion_programada);
                return diasA - diasB;
            });
        }

        // Función para renderizar alertas
        function renderizarAlertas() {
            const alertas = generarAlertas(transformadoresData);
            const alertasContainer = document.getElementById("alertasList");
            const alertasCount = document.getElementById("alertasCount");
            
            alertasCount.textContent = alertas.length;
            
            if (alertas.length === 0) {
                alertasContainer.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">✅ Todos los mantenimientos al día</div>';
                return;
            }
            
            alertasContainer.innerHTML = alertas.map(alerta => `
                <div class="alerta-item ${alerta.urgencia === 'urgente' ? 'urgente' : ''}">
                    <div class="alerta-info">
                        <strong>${alerta.subestacion} - ${alerta.nombre_equipo}</strong><br>
                        <span class="${alerta.urgencia === 'urgente' ? 'urgente-text' : ''}">⚠️ ${alerta.mensaje}</span><br>
                        <span class="alerta-fecha">Próxima mantención: ${alerta.proxima_mantencion_programada || "No programada"}</span>
                    </div>
                    <button class="btn-alerta" onclick="abrirModalEdicion('${alerta._id}')">📅 Programar</button>
                </div>
            `).join('');
        }

        function agruparPorSubestacion(data) {
            const grupos = {};
            data.forEach(t => {
                const subestacion = t.subestacion || "Sin subestación";
                if (!grupos[subestacion]) grupos[subestacion] = [];
                grupos[subestacion].push(t);
            });
            return grupos;
        }

        function filtrarTransformadores(transformadores) {
            return transformadores.filter(t => {
                if (currentFilter !== "all") {
                    if (currentFilter === "No Operativo") {
                        if (!["No Operativo", "Daño Interno", "incendiado", "Averiado", "Dado de baja"].includes(t.estado_actual)) {
                            return false;
                        }
                    } else if (currentFilter === "mantenimiento") {
                        const estadoMant = obtenerEstadoMantenimiento(t.proxima_mantencion_programada);
                        if (estadoMant !== "vencido" && estadoMant !== "proximo") return false;
                    } else if (t.estado_actual !== currentFilter) {
                        return false;
                    }
                }
                if (currentSearch) {
                    const searchLower = currentSearch.toLowerCase();
                    return (t.subestacion || "").toLowerCase().includes(searchLower) ||
                           (t.nombre_equipo || "").toLowerCase().includes(searchLower) ||
                           (t.fabricante || "").toLowerCase().includes(searchLower) ||
                           (t.numero_serie || "").toLowerCase().includes(searchLower);
                }
                return true;
            });
        }

        function actualizarEstadisticas(transformadores) {
            const subestaciones = new Set(transformadores.map(t => t.subestacion));
            const operativos = transformadores.filter(t => t.estado_actual === "Operativo").length;
            const noOperativos = transformadores.filter(t => 
                ["No Operativo", "Daño Interno", "incendiado", "Averiado", "Dado de baja"].includes(t.estado_actual)
            ).length;
            
            document.getElementById("totalSubestaciones").textContent = subestaciones.size;
            document.getElementById("totalTransformadores").textContent = transformadores.length;
            document.getElementById("totalOperativos").textContent = operativos;
            document.getElementById("totalNoOperativos").textContent = noOperativos;
        }

        function getEstadoClass(estado) {
            return `estado-${(estado || "Desconocido").replace(/\s+/g, '-')}`;
        }

        function renderDashboard() {
            const transformadoresFiltrados = filtrarTransformadores(transformadoresData);
            const grupos = agruparPorSubestacion(transformadoresFiltrados);
            const subestacionesOrdenadas = Object.keys(grupos).sort();
            
            actualizarEstadisticas(transformadoresFiltrados);
            
            const grid = document.getElementById("subestacionesGrid");
            
            if (subestacionesOrdenadas.length === 0) {
                grid.innerHTML = '<div class="empty-state">🔍 No se encontraron resultados</div>';
                return;
            }
            
            grid.innerHTML = subestacionesOrdenadas.map(subestacion => {
                const transformadores = grupos[subestacion];
                const operativosCount = transformadores.filter(t => t.estado_actual === "Operativo").length;
                const dañadosCount = transformadores.length - operativosCount;
                const safeId = subestacion.replace(/[^a-zA-Z0-9]/g, '_');
                
                return `
                    <div class="subestacion-card">
                        <div class="subestacion-header" onclick="toggleSubestacion('${subestacion.replace(/'/g, "\\'")}')">
                            <h3>
                                📍 ${subestacion}
                                <span class="badge">${transformadores.length} transformadores</span>
                                ${operativosCount > 0 ? `<span class="badge" style="background:#28a745;">✓ ${operativosCount}</span>` : ''}
                                ${dañadosCount > 0 ? `<span class="badge" style="background:#dc3545;">⚠ ${dañadosCount}</span>` : ''}
                            </h3>
                            <span class="toggle-icon" id="icon-${safeId}">▼</span>
                        </div>
                        <div class="transformadores-list" id="list-${safeId}">
                            ${transformadores.map(t => {
                                const estadoMant = obtenerEstadoMantenimiento(t.proxima_mantencion_programada);
                                const mantClass = estadoMant === "vencido" ? "mantenimiento-urgente" : "";
                                return `
                                <div class="transformador-item" onclick="abrirModalDetalles('${t._id}')">
                                    <div class="transformador-info">
                                        <div class="transformador-nombre">
                                            ⚡ ${t.nombre_equipo}
                                            <span class="estado-badge ${getEstadoClass(t.estado_actual)}">${t.estado_actual || "Desconocido"}</span>
                                            ${estadoMant === "vencido" ? '<span class="estado-badge" style="background:#dc3545; color:white;">⚠️ MANTENIMIENTO VENCIDO</span>' : ''}
                                            ${estadoMant === "proximo" ? '<span class="estado-badge" style="background:#ffc107; color:#856404;">🔧 MANTENIMIENTO PRÓXIMO</span>' : ''}
                                        </div>
                                        <div class="transformador-detalles">
                                            ${t.fabricante ? `🏭 ${t.fabricante}` : ''}
                                            ${t.voltaje_primario_kv && t.voltaje_secundario_kv ? 
                                                ` | ⚡ ${t.voltaje_primario_kv}/${Array.isArray(t.voltaje_secundario_kv) ? t.voltaje_secundario_kv.join('/') : t.voltaje_secundario_kv} kV` : ''}
                                            ${t.capacidad ? ` | 📊 ${t.capacidad} MVA` : ''}
                                            ${t.numero_serie ? ` | 🔢 ${t.numero_serie}` : ''}
                                        </div>
                                        <div class="mantenimiento-info ${mantClass}">
                                            📅 Última inspección: ${t.fecha_ultima_inspeccion || "No registrada"} | 
                                            🔧 Próxima mantención: ${t.proxima_mantencion_programada || "No programada"}
                                        </div>
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            
            renderizarAlertas();
        }

        function toggleSubestacion(subestacion) {
            const safeId = subestacion.replace(/[^a-zA-Z0-9]/g, '_');
            const list = document.getElementById(`list-${safeId}`);
            const icon = document.getElementById(`icon-${safeId}`);
            if (list.classList.contains('expanded')) {
                list.classList.remove('expanded');
                icon.classList.remove('expanded');
            } else {
                list.classList.add('expanded');
                icon.classList.add('expanded');
            }
        }

        function abrirModalDetalles(id) {

                <div class="detail-row"><span class="detail-label">Última Inspección:</span><span class="detail-value">${transformador.fecha_ultima_inspeccion || "No registrada"}</span></div>
                <div class="detail-row"><span class="detail-label">Próxima Mantención:</span><span class="detail-value">${transformador.proxima_mantencion_programada || "No programada"}</span></div>
                <div class="detail-row"><span class="detail-label">Observaciones:</span><span class="detail-value">${transformador.observaciones || "Sin observaciones"}</span></div>
            `;
            
            // Limpiar y ocultar formulario de edición
            document.getElementById("editForm").style.display = "none";
            document.getElementById("editFechaInspeccion").value = transformador.fecha_ultima_inspeccion || "";
            document.getElementById("editProximaMantencion").value = transformador.proxima_mantencion_programada || "";
            
            modal.style.display = "flex";
        }
        
        function abrirModalEdicion(id) {
            abrirModalDetalles(id);
            mostrarFormularioEdicion();
        }
        
        function mostrarFormularioEdicion() {
            const form = document.getElementById("editForm");
            form.style.display = form.style.display === "none" ? "block" : "none";
        }
        
        function guardarMantenimiento() {
            if (!currentEditingId) return;
            
            const transformador = transformadoresData.find(t => t._id === currentEditingId);
            if (transformador) {
                const nuevaInspeccion = document.getElementById("editFechaInspeccion").value;
                const nuevaMantencion = document.getElementById("editProximaMantencion").value;
                
                if (nuevaInspeccion) transformador.fecha_ultima_inspeccion = nuevaInspeccion;
                if (nuevaMantencion) transformador.proxima_mantencion_programada = nuevaMantencion;
                
                // Actualizar observaciones con registro de cambio
                const fechaActual = new Date().toLocaleDateString();
                transformador.observaciones = `[${fechaActual}] Mantenimiento actualizado. Próxima fecha: ${nuevaMantencion || "No definida"}. ` + (transformador.observaciones || "");
                
                // Cerrar formulario y refrescar
                document.getElementById("editForm").style.display = "none";
                renderDashboard();
                
                // Mostrar mensaje de éxito
                alert("✅ Mantenimiento actualizado correctamente");
            }
        }

        // Event listeners
        document.getElementById("searchInput").addEventListener("input", (e) => {
            currentSearch = e.target.value;
            renderDashboard();
        });
        
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                renderDashboard();
            });
        });
        
        document.querySelector(".close-modal").addEventListener("click", () => {
            document.getElementById("modal").style.display = "none";
        });
        
        window.onclick = (event) => {
            if (event.target === document.getElementById("modal")) {
                document.getElementById("modal").style.display = "none";
            }
        };
        
        window.toggleSubestacion = toggleSubestacion;
        window.abrirModalDetalles = abrirModalDetalles;
        window.abrirModalEdicion = abrirModalEdicion;
        window.mostrarFormularioEdicion = mostrarFormularioEdicion;
        window.guardarMantenimiento = guardarMantenimiento;
        
        // Inicializar
        renderDashboard();
    </script>
</body>
</html>
