<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Transformadores - Gestión de Mantenimientos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #666;
            font-size: 0.9rem;
        }

        .alertas-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .alertas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .alertas-header h2 {
            font-size: 1.3rem;
            color: #333;
        }

        .alertas-badge {
            background: #dc3545;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .alerta-item {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .alerta-item.urgente {
            background: #f8d7da;
            border-left-color: #dc3545;
        }

        .alerta-info {
            flex: 1;
        }

        .alerta-info strong {
            color: #856404;
        }

        .alerta-info .urgente-text {
            color: #721c24;
        }

        .alerta-fecha {
            font-size: 0.85rem;
            color: #856404;
        }

        .btn-alerta {
            background: #ffc107;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-alerta:hover {
            background: #e0a800;
        }

        .filters {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
            margin-bottom: 15px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-btn:hover {
            background: #e0e0e0;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .subestaciones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 25px;
        }

        .subestacion-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .subestacion-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .subestacion-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subestacion-header h3 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .toggle-icon {
            transition: transform 0.3s;
            font-size: 1.2rem;
        }

        .toggle-icon.expanded {
            transform: rotate(180deg);
        }

        .transformadores-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }

        .transformadores-list.expanded {
            max-height: 4000px;
            transition: max-height 0.6s ease-in;
        }

        .transformador-item {
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .transformador-item:hover {
            background: #f8f9fa;
        }

        .transformador-info {
            flex: 1;
        }

        .transformador-nombre {
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .transformador-detalles {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
        }

        .estado-badge {
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .estado-Operativo { background: #d4edda; color: #155724; }
        .estado-Daño-Interno, .estado-incendiado, .estado-Averiado, .estado-Dado-de-baja { background: #f8d7da; color: #721c24; }
        .estado-No-Operativo { background: #fff3cd; color: #856404; }
        .estado-Reserva { background: #d1ecf1; color: #0c5460; }

        .mantenimiento-info {
            font-size: 0.7rem;
            margin-top: 4px;
            color: #856404;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mantenimiento-urgente {
            color: #dc3545;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            max-width: 650px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .close-modal {
            cursor: pointer;
            font-size: 1.5rem;
            color: #888;
        }

        .detail-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-label {
            font-weight: 600;
            width: 160px;
            color: #555;
        }

        .detail-value {
            flex: 1;
            color: #333;
        }

        .edit-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            font-size: 1rem;
        }

        .edit-btn:hover {
            background: #5a67d8;
        }

        .edit-form {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .edit-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .save-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .save-btn:hover {
            background: #218838;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: white;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .subestaciones-grid {
                grid-template-columns: 1fr;
            }
            .detail-label {
                width: 120px;
            }
        }
    </style>
</head>

            {"_id":"t078","nombre_equipo":"Transformador de Potencia T2","subestacion":"Epiclachima","capacidad":"20/27/33","relacion":"46/23","tipo_conexion":"DYn1","fabricante":"Siemens","numero_serie":"185411","ano_fabricacion":2002,"voltaje_primario_kv":46,"voltaje_secundario_kv":23,"estado_actual":"incendiado","fecha_ultima_inspeccion":"2024-12-20","proxima_mantencion_programada":null,"observaciones":"EQUIPO INCENDIADO - FUERA DE SERVICIO"},
            {"_id":"t079","nombre_equipo":"Transformador de Potencia T2","subestacion":"Pomasqui","capacidad":"","relacion":"","tipo_conexion":"DYn1","fabricante":"ABB","numero_serie":"94.4.3338","ano_fabricacion":null,"voltaje_primario_kv":138,"voltaje_secundario_kv":23,"estado_actual":"Operativo","fecha_ultima_inspeccion":"2024-10-15","proxima_mantencion_programada":"2025-10-15","observaciones":"Sin novedades"},
            {"_id":"t080","nombre_equipo":"Transformador de Potencia T2","subestacion":"Pomasqui","capacidad":"20/27/33","relacion":"138/23","tipo_conexion":"DYn1","fabricante":"TRAFO","numero_serie":"XA1604A001","ano_fabricacion":2004,"voltaje_primario_kv":138,"voltaje_secundario_kv":23,"estado_actual":"Daño Interno","fecha_ultima_inspeccion":"2024-01-15","proxima_mantencion_programada":"2025-01-15","observaciones":"Requiere revisión urgente"},
            {"_id":"t081","nombre_equipo":"Transformador de Potencia T1","subestacion":"Miraflores","capacidad":"15/20","relacion":"43.8/6.3","tipo_conexion":"DYn1","fabricante":"Mitsubishi","numero_serie":"558409","ano_fabricacion":1972,"voltaje_primario_kv":46,"voltaje_secundario_kv":6.3,"estado_actual":"No Operativo","fecha_ultima_inspeccion":"2024-03-15","proxima_mantencion_programada":"2025-03-15","observaciones":"FUERA DE SERVICIO"},
            {"_id":"t082","nombre_equipo":"Transformador de Potencia T2","subestacion":"Diez Vieja","capacidad":"5/6.25","relacion":"43.8-21.9/6.3","tipo_conexion":"DYn1","fabricante":"Siemens","numero_serie":"T98676","ano_fabricacion":1960,"voltaje_primario_kv":43.8,"voltaje_secundario_kv":6.3,"estado_actual":"Averiado","fecha_ultima_inspeccion":"2024-04-10","proxima_mantencion_programada":"2025-04-10","observaciones":"REPARACIÓN PENDIENTE"}
        ];

        let currentEditingId = null;
        let currentFilter = "all";
        let currentSearch = "";

        function calcularDiasHastaMantenimiento(fechaProxima) {
            if (!fechaProxima) return null;
            const hoy = new Date();
            const proxima = new Date(fechaProxima);
            const diffTime = proxima - hoy;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

        function obtenerEstadoMantenimiento(fechaProxima) {
            const dias = calcularDiasHastaMantenimiento(fechaProxima);
            if (dias === null) return "sin-datos";
            if (dias < 0) return "vencido";
            if (dias <= 30) return "proximo";
            return "ok";
        }

        function generarAlertas(transformadores) {
            const alertas = [];
            transformadores.forEach(t => {
                if (t.proxima_mantencion_programada) {
                    const dias = calcularDiasHastaMantenimiento(t.proxima_mantencion_programada);
                    if (dias < 0) {
                        alertas.push({...t, tipo: "vencido", mensaje: `Mantenimiento VENCIDO hace ${Math.abs(dias)} días`, urgencia: "urgente"});
                    } else if (dias <= 30) {
                        alertas.push({...t, tipo: "proximo", mensaje: `Mantenimiento programado en ${dias} días`, urgencia: "advertencia"});
                    }
                }
            });
            return alertas.sort((a, b) => {
                const diasA = calcularDiasHastaMantenimiento(a.proxima_mantencion_programada);
                const diasB = calcularDiasHastaMantenimiento(b.proxima_mantencion_programada);
                return diasA - diasB;
            });
        }

        function renderizarAlertas() {
            const alertas = generarAlertas(transformadoresData);
            const alertasContainer = document.getElementById("alertasList");
            const alertasCount = document.getElementById("alertasCount");
            alertasCount.textContent = alertas.length;
            if (alertas.length === 0) {
                alertasContainer.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">✅ Todos los mantenimientos al día</div>';
                return;
            }
            alertasContainer.innerHTML = alertas.map(alerta => `
                <div class="alerta-item ${alerta.urgencia === 'urgente' ? 'urgente' : ''}">
                    <div class="alerta-info">
                        <strong>${alerta.subestacion} - ${alerta.nombre_equipo}</strong><br>
                        <span class="${alerta.urgencia === 'urgente' ? 'urgente-text' : ''}">⚠️ ${alerta.mensaje}</span><br>
                        <span class="alerta-fecha">Próxima mantención: ${alerta.proxima_mantencion_programada || "No programada"}</span>
                    </div>
                    <button class="btn-alerta" onclick="abrirModalEdicion('${alerta._id}')">📅 Programar</button>
                </div>
            `).join('');
        }

        function agruparPorSubestacion(data) {
            const grupos = {};
            data.forEach(t => {
                const subestacion = t.subestacion || "Sin subestación";
                if (!grupos[subestacion]) grupos[subestacion] = [];
                grupos[subestacion].push(t);
            });
            return grupos;
        }

        function filtrarTransformadores(transformadores) {
            return transformadores.filter(t => {
                if (currentFilter !== "all") {
                    if (currentFilter === "No Operativo") {
                        if (!["No Operativo", "Daño Interno", "incendiado", "Averiado", "Dado de baja"].includes(t.estado_actual)) return false;
                    } else if (currentFilter === "mantenimiento") {
                        const estadoMant = obtenerEstadoMantenimiento(t.proxima_mantencion_programada);
                        if (estadoMant !== "vencido" && estadoMant !== "proximo") return false;
                    } else if (t.estado_actual !== currentFilter) return false;
                }
                if (currentSearch) {
                    const searchLower = currentSearch.toLowerCase();
                    return (t.subestacion || "").toLowerCase().includes(searchLower) ||
                           (t.nombre_equipo || "").toLowerCase().includes(searchLower) ||
                           (t.fabricante || "").toLowerCase().includes(searchLower) ||
                           (t.numero_serie || "").toLowerCase().includes(searchLower);
                }
                return true;
            });
        }

        function actualizarEstadisticas(transformadores) {
            const subestaciones = new Set(transformadores.map(t => t.subestacion));
            const operativos = transformadores.filter(t => t.estado_actual === "Operativo").length;
            const noOperativos = transformadores.filter(t => ["No Operativo", "Daño Interno", "incendiado", "Averiado", "Dado de baja"].includes(t.estado_actual)).length;
            document.getElementById("totalSubestaciones").textContent = subestaciones.size;
            document.getElementById("totalTransformadores").textContent = transformadores.length;
            document.getElementById("totalOperativos").textContent = operativos;
            document.getElementById("totalNoOperativos").textContent = noOperativos;
        }

        function getEstadoClass(estado) {
            return `estado-${(estado || "Desconocido").replace(/\s+/g, '-')}`;
        }

        function renderDashboard() {
            const transformadoresFiltrados = filtrarTransformadores(transformadoresData);
            const grupos = agruparPorSubestacion(transformadoresFiltrados);
            const subestacionesOrdenadas = Object.keys(grupos).sort();
            actualizarEstadisticas(transformadoresFiltrados);
            const grid = document.getElementById("subestacionesGrid");
            if (subestacionesOrdenadas.length === 0) {
                grid.innerHTML = '<div class="empty-state">🔍 No se encontraron resultados</div>';
                return;
            }
            grid.innerHTML = subestacionesOrdenadas.map(subestacion => {
                const transformadores = grupos[subestacion];
                const operativosCount = transformadores.filter(t => t.estado_actual === "Operativo").length;
                const dañadosCount = transformadores.length - operativosCount;
                const safeId = subestacion.replace(/[^a-zA-Z0-9]/g, '_');
                return `
                    <div class="subestacion-card">
                        <div class="subestacion-header" onclick="toggleSubestacion('${subestacion.replace(/'/g, "\\'")}')">
                            <h3>📍 ${subestacion}<span class="badge">${transformadores.length} transformadores</span>${operativosCount > 0 ? `<span class="badge" style="background:#28a745;">✓ ${operativosCount}</span>` : ''}${dañadosCount > 0 ? `<span class="badge" style="background:#dc3545;">⚠ ${dañadosCount}</span>` : ''}</h3>
                            <span class="toggle-icon" id="icon-${safeId}">▼</span>
                        </div>
                        <div class="transformadores-list" id="list-${safeId}">
                            ${transformadores.map(t => {
                                const estadoMant = obtenerEstadoMantenimiento(t.proxima_mantencion_programada);
                                const mantClass = estadoMant === "vencido" ? "mantenimiento-urgente" : "";
                                return `
                                <div class="transformador-item" onclick="abrirModalDetalles('${t._id}')">
                                    <div class="transformador-info">
                                        <div class="transformador-nombre">
                                            ⚡ ${t.nombre_equipo}
                                            <span class="estado-badge ${getEstadoClass(t.estado_actual)}">${t.estado_actual || "Desconocido"}</span>
                                            ${estadoMant === "vencido" ? '<span class="estado-badge" style="background:#dc3545; color:white;">⚠️ VENCIDO</span>' : ''}
                                            ${estadoMant === "proximo" ? '<span class="estado-badge" style="background:#ffc107; color:#856404;">🔧 PRÓXIMO</span>' : ''}
                                        </div>
                                        <div class="transformador-detalles">${t.fabricante ? `🏭 ${t.fabricante}` : ''}${t.voltaje_primario_kv && t.voltaje_secundario_kv ? ` | ⚡ ${t.voltaje_primario_kv}/${Array.isArray(t.voltaje_secundario_kv) ? t.voltaje_secundario_kv.join('/') : t.voltaje_secundario_kv} kV` : ''}${t.capacidad ? ` | 📊 ${t.capacidad} MVA` : ''}${t.numero_serie ? ` | 🔢 ${t.numero_serie}` : ''}</div>
                                        <div class="mantenimiento-info ${mantClass}">📅 Última: ${t.fecha_ultima_inspeccion || "N/R"} | 🔧 Próxima: ${t.proxima_mantencion_programada || "N/P"}</div>
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            renderizarAlertas();
        }

        function toggleSubestacion(subestacion) {
            const safeId = subestacion.replace(/[^a-zA-Z0-9]/g, '_');
            const list = document.getElementById(`list-${safeId}`);
            const icon = document.getElementById(`icon-${safeId}`);
            if (list.classList.contains('expanded')) {
                list.classList.remove('expanded');
                icon.classList.remove('expanded');
            } else {
                list.classList.add('expanded');
                icon.classList.add('expanded');
            }
        }

        function abrirModalDetalles(id) {
            const transformador = transformadoresData.find(t => t._id === id);
            if (!transformador) return;
            currentEditingId = id;
            const modal = document.getElementById("modal");
            document.getElementById("modalTitle").textContent = transformador.nombre_equipo;
            const estadoMant = obtenerEstadoMantenimiento(transformador.proxima_mantencion_programada);
            const alertaMant = estadoMant === "vencido" ? '<div class="alerta-item urgente" style="margin-bottom:15px;"><strong>⚠️ ¡MANTENIMIENTO VENCIDO!</strong> Programe una nueva fecha inmediatamente.</div>' : estadoMant === "proximo" ? '<div class="alerta-item" style="margin-bottom:15px;"><strong>🔧 Mantenimiento próximo</strong> Programado para dentro de pocos días.</div>' : '';
            document.getElementById("modalBody").innerHTML = `${alertaMant}
                <div class="detail-row"><span class="detail-label">Subestación:</span><span class="detail-value">${transformador.subestacion || "No especificada"}</span></div>
                <div class="detail-row"><span class="detail-label">Fabricante:</span><span class="detail-value">${transformador.fabricante || "No especificado"}</span></div>
                <div class="detail-row"><span class="detail-label">Número de Serie:</span><span class="detail-value">${transformador.numero_serie || "No especificado"}</span></div>
                <div class="detail-row"><span class="detail-label">Año Fabricación:</span><span class="detail-value">${transformador.ano_fabricacion || "No especificado"}</span></div>
                <div class="detail-row"><span class="detail-label">Estado Actual:</span><span class="detail-value"><span class="estado-badge ${getEstadoClass(transformador.estado_actual)}">${transformador.estado_actual || "Desconocido"}</span></span></div>
                <div class="detail-row"><span class="detail-label">Voltajes:</span><span class="detail-value">${transformador.voltaje_primario_kv || "?"} / ${Array.isArray(transformador.voltaje_secundario_kv) ? transformador.voltaje_secundario_kv.join('/') : transformador.voltaje_secundario_kv || "?"} kV</span></div>
                <div class="detail-row"><span class="detail-label">Capacidad:</span><span class="detail-value">${transformador.capacidad || "No especificada"} MVA</span></div>
                <div class="detail-row"><span class="detail-label">Relación:</span><span class="detail-value">${transformador.relacion || "No especificada"}</span></div>
                <div class="detail-row"><span class="detail-label">Conexión:</span><span class="detail-value">${transformador.tipo_conexion || "No especificada"}</span></div>
                <div class="detail-row"><span class="detail-label">Última Inspección:</span><span class="detail-value">${transformador.fecha_ultima_inspeccion || "No registrada"}</span></div>
                <div class="detail-row"><span class="detail-label">Próxima Mantención:</span><span class="detail-value">${transformador.proxima_mantencion_programada || "No programada"}</span></div>
                <div class="detail-row"><span class="detail-label">Observaciones:</span><span class="detail-value">${transformador.observaciones || "Sin observaciones"}</span></div>`;
            document.getElementById("editForm").style.display = "none";
            document.getElementById("editFechaInspeccion").value = transformador.fecha_ultima_inspeccion || "";
            document.getElementById("editProximaMantencion").value = transformador.proxima_mantencion_programada || "";
            modal.style.display = "flex";
        }

        function abrirModalEdicion(id) { abrirModalDetalles(id); mostrarFormularioEdicion(); }
        function mostrarFormularioEdicion() { const form = document.getElementById("editForm"); form.style.display = form.style.display === "none" ? "block" : "none"; }
        function guardarMantenimiento() {
            if (!currentEditingId) return;
            const transformador = transformadoresData.find(t => t._id === currentEditingId);
            if (transformador) {
                const nuevaInspeccion = document.getElementById("editFechaInspeccion").value;
                const nuevaMantencion = document.getElementById("editProximaMantencion").value;
                if (nuevaInspeccion) transformador.fecha_ultima_inspeccion = nuevaInspeccion;
                if (nuevaMantencion) transformador.proxima_mantencion_programada = nuevaMantencion;
                const fechaActual = new Date().toLocaleDateString();
                transformador.observaciones = `[${fechaActual}] Mantenimiento actualizado. Próxima: ${nuevaMantencion || "No definida"}. ` + (transformador.observaciones || "");
                document.getElementById("editForm").style.display = "none";
                renderDashboard();
                alert("✅ Mantenimiento actualizado correctamente");
            }
        }

        document.getElementById("searchInput").addEventListener("input", (e) => { currentSearch = e.target.value; renderDashboard(); });
        document.querySelectorAll(".filter-btn").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentFilter = btn.dataset.filter; renderDashboard(); }); });
        document.querySelector(".close-modal").addEventListener("click", () => { document.getElementById("modal").style.display = "none"; });
        window.onclick = (event) => { if (event.target === document.getElementById("modal")) document.getElementById("modal").style.display = "none"; };
        window.toggleSubestacion = toggleSubestacion;
        window.abrirModalDetalles = abrirModalDetalles;
        window.abrirModalEdicion = abrirModalEdicion;
        window.mostrarFormularioEdicion = mostrarFormularioEdicion;
        window.guardarMantenimiento = guardarMantenimiento;
        
        renderDashboard();
    </script>
</body>
</html>
