<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Transformadores por Subestación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-card h3 {
            font-size: 2rem;
            color: #667eea;
        }

        .filters {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .subestaciones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .subestacion-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .subestacion-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subestacion-header h3 {
            font-size: 1.2rem;
        }

        .badge {
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 8px;
        }

        .transformadores-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .transformadores-list.expanded {
            max-height: 2000px;
            transition: max-height 0.5s ease-in;
        }

        .transformador-item {
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .transformador-item:hover {
            background: #f8f9fa;
        }

        .transformador-nombre {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .transformador-detalles {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }

        .estado-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .estado-Operativo { background: #d4edda; color: #155724; }
        .estado-Daño-Interno, .estado-incendiado, .estado-Averiado { background: #f8d7da; color: #721c24; }
        .estado-No-Operativo { background: #fff3cd; color: #856404; }
        .estado-Reserva { background: #d1ecf1; color: #0c5460; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .close-modal {
            cursor: pointer;
            font-size: 1.5rem;
            color: #888;
        }

        .detail-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-label {
            font-weight: 600;
            width: 140px;
            color: #555;
        }

        .detail-value {
            flex: 1;
            color: #333;
        }

        .loading, .empty-state {
            text-align: center;
            padding: 50px;
            color: white;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        @media (max-width: 768px) {
            .subestaciones-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

            <h1>🏭 Dashboard de Transformadores</h1>
            <p>Visualización de transformadores por subestación</p>
        </div>

        <div class="stats-container" id="statsContainer">
            <div class="stat-card">
                <h3 id="totalSubestaciones">0</h3>

            <div class="stat-card">

            <div class="stat-card">

            </div>
            <div class="stat-card">

                <p>No Operativos/Dañados</p>
            </div>
        </div>

        <div class="filters">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Buscar subestación, transformador o fabricante...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">📊 Todos</button>
                <button class="filter-btn" data-filter="Operativo">✅ Operativos</button>
                <button class="filter-btn" data-filter="No Operativo">⚠️ No Operativos</button>
                <button class="filter-btn" data-filter="Daño Interno">🔥 Daño Interno</button>
                <button class="filter-btn" data-filter="Averiado">🔧 Averiados</button>
                <button class="filter-btn" data-filter="Reserva">📦 En Reserva</button>
            </div>
        </div>

        <div id="subestacionesGrid" class="subestaciones-grid">
            <div class="loading">📂 Cargando datos...</div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Detalles del Transformador</h2>
                <span class="close-modal">&times;</span>

            <div id="modalBody"></div>
        </div>
    </div>

                "relacion": "46/23/6.3",

                "fabricante": "Raycham",
                "numero_serie": "",
                "ano_fabricacion": 2017,
                "voltaje_primario_kv": 46,
                "voltaje_secundario_kv": [6.3, 22.8],
                "estado_actual": "Operativo",
                "observaciones": "Nivel de aceite en rango, vibraciones normales."
            }
        ];

        let currentFilter = "all";
        let currentSearch = "";

        function agruparPorSubestacion(data) {
            const grupos = {};
            data.forEach(t => {
                const subestacion = t.subestacion || "Sin subestación";
                if (!grupos[subestacion]) grupos[subestacion] = [];
                grupos[subestacion].push(t);
            });
            return grupos;
        }

        function filtrarTransformadores(transformadores) {
            return transformadores.filter(t => {
                if (currentFilter !== "all") {
                    if (currentFilter === "No Operativo") {
                        if (!["No Operativo", "Daño Interno", "incendiado", "Averiado", "Dado de baja"].includes(t.estado_actual)) {
                            return false;
                        }
                    } else if (t.estado_actual !== currentFilter) {
                        return false;
                    }
                }
                if (currentSearch) {
                    const searchLower = currentSearch.toLowerCase();
                    return (t.subestacion || "").toLowerCase().includes(searchLower) ||
                           (t.nombre_equipo || "").toLowerCase().includes(searchLower) ||
                           (t.fabricante || "").toLowerCase().includes(searchLower) ||
                           (t.numero_serie || "").toLowerCase().includes(searchLower);
                }
                return true;
            });
        }

        function actualizarEstadisticas(transformadores) {
            const subestaciones = new Set(transformadores.map(t => t.subestacion));
            const operativos = transformadores.filter(t => t.estado_actual === "Operativo").length;
            const noOperativos = transformadores.filter(t => 
                ["No Operativo", "Daño Interno", "incendiado", "Averiado", "Dado de baja"].includes(t.estado_actual)
            ).length;
            
            document.getElementById("totalSubestaciones").textContent = subestaciones.size;
            document.getElementById("totalTransformadores").textContent = transformadores.length;
            document.getElementById("totalOperativos").textContent = operativos;
            document.getElementById("totalNoOperativos").textContent = noOperativos;
        }

        function getEstadoClass(estado) {
            return `estado-${(estado || "Desconocido").replace(/\s+/g, '-')}`;
        }

        function renderDashboard() {
            const transformadoresFiltrados = filtrarTransformadores(transformadoresData);
            const grupos = agruparPorSubestacion(transformadoresFiltrados);
            const subestacionesOrdenadas = Object.keys(grupos).sort();
            
            actualizarEstadisticas(transformadoresFiltrados);
            
            const grid = document.getElementById("subestacionesGrid");
            
            if (subestacionesOrdenadas.length === 0) {
                grid.innerHTML = '<div class="empty-state">🔍 No se encontraron resultados</div>';
                return;
            }
            
            grid.innerHTML = subestacionesOrdenadas.map(subestacion => {
                const transformadores = grupos[subestacion];
                const operativosCount = transformadores.filter(t => t.estado_actual === "Operativo").length;
                const dañadosCount = transformadores.length - operativosCount;
                
                return `
                    <div class="subestacion-card">
                        <div class="subestacion-header" onclick="toggleSubestacion('${subestacion.replace(/'/g, "\\'")}')">
                            <h3>
                                📍 ${subestacion}
                                <span class="badge">${transformadores.length} transformadores</span>
                                ${operativosCount > 0 ? `<span class="badge" style="background:#28a745;">✓ ${operativosCount}</span>` : ''}
                                ${dañadosCount > 0 ? `<span class="badge" style="background:#dc3545;">⚠ ${dañadosCount}</span>` : ''}
                            </h3>
                            <span class="toggle-icon" id="icon-${subestacion.replace(/[^a-zA-Z0-9]/g, '_')}">▼</span>
                        </div>
                        <div class="transformadores-list" id="list-${subestacion.replace(/[^a-zA-Z0-9]/g, '_')}">
                            ${transformadores.map(t => `
                                <div class="transformador-item" onclick="mostrarDetalles('${t._id}')">
                                    <div class="transformador-info">
                                        <div class="transformador-nombre">
                                            ⚡ ${t.nombre_equipo}
                                            <span class="estado-badge ${getEstadoClass(t.estado_actual)}">${t.estado_actual || "Desconocido"}</span>
                                        </div>
                                        <div class="transformador-detalles">
                                            ${t.fabricante ? `🏭 ${t.fabricante}` : ''}
                                            ${t.voltaje_primario_kv && t.voltaje_secundario_kv ? 
                                                ` | ⚡ ${t.voltaje_primario_kv}/${Array.isArray(t.voltaje_secundario_kv) ? t.voltaje_secundario_kv.join('/') : t.voltaje_secundario_kv} kV` : ''}
                                            ${t.capacidad ? ` | 📊 ${t.capacidad} MVA` : ''}
                                            ${t.numero_serie ? ` | 🔢 ${t.numero_serie}` : ''}
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleSubestacion(subestacion) {
            const safeId = subestacion.replace(/[^a-zA-Z0-9]/g, '_');
            const list = document.getElementById(`list-${safeId}`);
            const icon = document.getElementById(`icon-${safeId}`);
            if (list.classList.contains('expanded')) {
                list.classList.remove('expanded');
                icon.classList.remove('expanded');
                icon.style.transform = '';
            } else {
                list.classList.add('expanded');
                icon.classList.add('expanded');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function mostrarDetalles(id) {
            const transformador = transformadoresData.find(t => t._id === id);
            if (!transformador) return;
            
            const modal = document.getElementById("modal");
            document.getElementById("modalTitle").textContent = transformador.nombre_equipo;
            
            document.getElementById("modalBody").innerHTML = `
                <div class="detail-row"><span class="detail-label">Subestación:</span><span class="detail-value">${transformador.subestacion || "No especificada"}</span></div>
                <div class="detail-row"><span class="detail-label">Fabricante:</span><span class="detail-value">${transformador.fabricante || "No especificado"}</span></div>
                <div class="detail-row"><span class="detail-label">Número de Serie:</span><span class="detail-value">${transformador.numero_serie || "No especificado"}</span></div>
                <div class="detail-row"><span class="detail-label">Año Fabricación:</span><span class="detail-value">${transformador.ano_fabricacion || "No especificado"}</span></div>
                <div class="detail-row"><span class="detail-label">Estado Actual:</span><span class="detail-value"><span class="estado-badge ${getEstadoClass(transformador.estado_actual)}">${transformador.estado_actual || "Desconocido"}</span></span></div>
                <div class="detail-row"><span class="detail-label">Voltajes:</span><span class="detail-value">${transformador.voltaje_primario_kv || "?"} / ${Array.isArray(transformador.voltaje_secundario_kv) ? transformador.voltaje_secundario_kv.join('/') : transformador.voltaje_secundario_kv || "?"} kV</span></div>
                <div class="detail-row"><span class="detail-label">Capacidad:</span><span class="detail-value">${transformador.capacidad || "No especificada"} MVA</span></div>
                <div class="detail-row"><span class="detail-label">Conexión:</span><span class="detail-value">${transformador.tipo_conexion || "No especificada"}</span></div>
                <div class="detail-row"><span class="detail-label">Observaciones:</span><span class="detail-value">${transformador.observaciones || "Sin observaciones"}</span></div>
            `;
            modal.style.display = "flex";
        }

        document.getElementById("searchInput").addEventListener("input", (e) => {
            currentSearch = e.target.value;
            renderDashboard();
        });
        
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                renderDashboard();
            });
        });
        
        document.querySelector(".close-modal").addEventListener("click", () => {
            document.getElementById("modal").style.display = "none";
        });
        
        window.onclick = (event) => {
            if (event.target === document.getElementById("modal")) {
                document.getElementById("modal").style.display = "none";
            }
        };
        
        window.toggleSubestacion = toggleSubestacion;
        window.mostrarDetalles = mostrarDetalles;
        
        renderDashboard();
    </script>
</body>
</html>
